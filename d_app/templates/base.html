<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}MonitorMind{% endblock %}</title>
</head>
<body style="font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px;">

  {% if user.is_authenticated %}
  <nav style="margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #ccc;">
    <strong>MonitorMind</strong> &nbsp;|&nbsp;
    <a href="#">Dashboard</a> &nbsp;
    <a href="#">Projects</a> &nbsp;
    <a href="#">Reports</a> &nbsp;
    <span style="float: right;">
      {{ user.username }} &nbsp;
      <form method="post" action="{% url 'accounts:logout' %}" style="display:inline;">
        {% csrf_token %}
        <button type="submit">Logout</button>
      </form>
    </span>
  </nav>
  {% endif %}

  {% if messages %}
    {% for message in messages %}
    <p style="color: {% if message.tags == 'error' %}red{% else %}green{% endif %};">
      {{ message }}
    </p>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}

</body>
</html>
